<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4th Quarter Events</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#a8e6cf,#dcedc1,#e0f7fa,#c5e1a5);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:#333;
overflow-x:hidden;
display:flex;
flex-direction:column;
align-items:center;
padding:50px 20px;
}
@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
text-align:center;
font-size:3rem;
background:linear-gradient(90deg,#a8e6cf,#b9fbc0,#dcedc1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:40px;
letter-spacing:3px;
}

/* Container and Cards */
.container{
max-width:900px;
display:flex;
flex-direction:column;
gap:30px;
}
.card img{
width:100%;
border-radius:25px;
border:6px solid rgba(168,230,207,0.5);
box-shadow:0 15px 35px rgba(168,230,207,0.3);
transition:0.4s;
}
.card img:hover{
transform:scale(1.05) rotate(1deg);
box-shadow:0 20px 45px rgba(168,230,207,0.5);
}

/* Pic credits */
p{
text-align:center;
font-size:0.9rem;
color:rgba(50,50,50,0.7);
margin-top:10px;
}

/* Floating blobs */
.blob{
position:fixed;
border-radius:50%;
filter:blur(100px);
opacity:0.6;
z-index:-1;
animation:float 20s infinite linear;
}
@keyframes float{
0%{transform:translateY(0) translateX(0);}
50%{transform:translateY(-120px) translateX(100px);}
100%{transform:translateY(0) translateX(0);}
}
</style>
</head>
<body>

<h1>4th Quarter Events</h1>

<div class="container">
<div class="card"><img src="04.jpg" alt="Noli Me"></div>
<div class="card"><img src="05.jpg" alt="BOTB"></div>
<div class="card"><img src="06.jpg" alt="Street Dance"></div>
<p>Pic Credits: Jade Imperial</p>
</div>

<div class="blob" style="width:250px;height:250px;background:#a8e6cf;top:10%;left:5%;"></div>
<div class="blob" style="width:300px;height:300px;background:#b9fbc0;top:70%;left:70%;"></div>
<div class="blob" style="width:200px;height:200px;background:#dcedc1;top:40%;left:80%;"></div>

</body>
</html>
