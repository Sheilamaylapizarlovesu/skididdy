<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MY E-PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Quicksand',sans-serif;
background:#ffd6e7;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

/* DASHED BORDER FRAME */

body::before{
content:"";
position:fixed;
top:15px;
left:15px;
right:15px;
bottom:15px;
border:6px dashed #a6d8ff;
border-radius:25px;
pointer-events:none;
z-index:-1;
}

/* HEADER */

header{
width:100%;
text-align:center;
padding:50px 0;
}

header h1{
font-family:'Quicksand',sans-serif;
font-size:3rem;
color:#ff4fa3;
margin:0;
font-weight:600;
letter-spacing:2px;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
align-items:center;
margin-top:40px;
gap:22px;
}

.menu a{
text-decoration:none;
background:#b8f2d6;
color:#2f6b55;
font-weight:600;
font-size:1.3rem;
padding:16px 45px;
border-radius:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
transition:all .3s ease;
border:2px solid #8dd9b5;
}

.menu a:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 15px 35px rgba(0,0,0,0.35);
background:#a4ebc8;
}

/* RESPONSIVE */

@media (min-width:700px){
.menu{
flex-direction:row;
flex-wrap:wrap;
justify-content:center;
}
}

/* LOADING SCREEN */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,200,220,0.9);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:1.5rem;
color:#ff4fa3;
visibility:hidden;
z-index:1000;
}

.spinner{
border:6px solid #ffe6f1;
border-top:6px solid #ff4fa3;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FLOATING STAR CONFETTI */

.star{
position:fixed;
color:#ffd84d;
font-size:22px;
animation:floatStar linear infinite;
opacity:0.9;
}

@keyframes floatStar{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-10vh) rotate(360deg);}
}

</style>
</head>

<body>

<header>
<h1 id="title"></h1>
</header>

<div class="menu">

<a href="AP.html" onclick="openPage(event)">AP Lessons</a>
<a href="ICT.html" onclick="openPage(event)">ICT Lessons</a>
<a href="ABOUT ME.html" onclick="openPage(event)">Personal Details</a>
<a href="EVENTS.html" onclick="openPage(event)">School Events</a>
<a href="ICT 1ST AND 2ND.html" onclick="openPage(event)">ICT 1st and 2nd Quarter</a>
<a href="ICT 3rd Quarter Browser Output.html" onclick="openPage(event)">ICT 3rd Quarter Browser Output</a>
<a href="3rd Quarter Events.html" onclick="openPage(event)">3rd Quarter Events</a>
<a href="AP COLLAB.html" onclick="openPage(event)">AP 4th Quarter</a>
<a href="Noli Me Tangere.html" onclick="openPage(event)">Noli Me Tangere</a>
<a href="ICT 4th Quarter Compilation.html" onclick="openPage(event)">ICT 4th Quarter Compilation</a>
<a href="4th Quarter Events.html" onclick="openPage(event)">4th Quarter Events</a>

</div>

<div id="loading">
<div class="spinner"></div>
Loading...
</div>

<script>

/* TITLE TYPING */

const text="MY E-PORTFOLIO";
let i=0;

function typeTitle(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typeTitle,100);
}
}

typeTitle();

/* LOADING PAGE */

function openPage(event){

event.preventDefault();

let link=event.currentTarget.href;

let loading=document.getElementById("loading");

loading.style.visibility="visible";

setTimeout(function(){
window.location.href=link;
},1200);

}

/* FLOATING STARS */

function createStars(){

for(let i=0;i<30;i++){

let star=document.createElement("div");

star.className="star";
star.innerHTML="★";

star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(Math.random()*6+6)+"s";
star.style.fontSize=(Math.random()*15+15)+"px";

document.body.appendChild(star);

}

}

createStars();

</script>

</body>
</html>
